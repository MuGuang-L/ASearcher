experiment_name: asearcher-light-qwen3
trial_name: run1

cluster:
  fileroot: /tmp/areal/experiments
  n_nodes: 1
  n_gpus_per_node: 2
  name_resolve:
    type: nfs
    nfs_record_root: /tmp/areal/name_resolve

seed: 1
total_train_epochs: 3
total_train_steps: null
tokenizer_path: ${actor.path}
allocation_mode: sglang:d1t1+fsdp:d1
async_training: true

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  backend: sglang:d1t1
  max_concurrent_rollouts: 8
  queue_size: 32
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false

gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_new_tokens: 192
  greedy: false
  temperature: 0.7

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-1.7B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 4096
  pad_to_maximum: false
  optimizer:
    type: adam
    lr: 5e-6
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 0.2
    warmup_steps_proportion: 0.001
  backend: fsdp:d1
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  adv_norm:
    mean_level: batch
    std_level: batch

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 8192
  optimizer: null
  backend: fsdp:d1

sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: 8
  context_length: 8192
  mem_fraction_static: 0.5
  attention_backend: fa3

train_dataset:
  type: rl
  batch_size: 16
  shuffle: true
  pin_memory: true
  path: path_to_training_data

saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: 3600

recover:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online
  swanlab:
    mode: disabled

max_turns: 8
n_trajs: 4
search_only: false
search_client_type: async-search-access
reward_type: F1
topk: 2
valid_inst_ratio: 0.5
log_agent_stats: true
log_agent_stats_keys:
  - num_input_tokens
  - num_output_tokens
  - num_llm_gens
  - num_search_queries
  - num_success_search_queries
  - num_failed_search_queries
  - num_pages
  - num_success_url_accesses
  - num_failed_url_accesses
  - repeated_actions
  - score
  - judge_q_invalid
  - format_reward

max_doc_chars: 320
max_page_total_chars: 30000
max_page_chunk_chars: 6000
max_page_chunks: 3
short_page_preview_chars: 160
use_short_context_for_rollout: true
search_step_penalty: 0.01
access_step_penalty: 0.0
repeated_action_penalty: 0.02
no_evidence_penalty: 0.2
no_access_penalty: 0.3
